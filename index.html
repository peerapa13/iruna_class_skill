<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iruna Online — อาชีพ</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+Thai:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --accent: #3fc8f9;
    --deep: #0a0812;
    --text: #e8e0f0;
    --text-dim: #9d8fb8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
  }

  #stars {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.12) 0%, transparent 60%);
  }

  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 36px;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .hero-desc {
    color: var(--text-dim);
    margin-bottom: 30px;
  }

  .main-wrapper {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 30px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }

  .sidebar h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(212, 168, 67, 0.3);
    padding-bottom: 12px;
  }

  .job-btn {
    text-align: left;
    padding: 12px 14px;
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    font-size: 13px;
  }

  .job-btn:hover, .job-btn.active {
    background: rgba(63, 200, 249, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .card {
    background: rgba(30, 41, 59, 0.8);
    padding: 32px;
    border-radius: 8px;
    border: 1px solid rgba(51, 65, 85, 0.8);
  }

  .job-title {
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .job-desc {
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .section-title {
    color: var(--gold);
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 10px;
  }

  .info-box {
    background: rgba(15, 23, 42, 0.8);
    padding: 14px;
    border-radius: 6px;
    border-left: 3px solid rgba(63, 200, 249, 0.5);
    color: var(--text-dim);
    line-height: 1.6;
  }

  .req-item {
    padding: 6px 0;
  }


  .skill-item {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 8px;
    padding: 16px;
    margin: 12px 0;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  .skill-name {
    color: #77D77B;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .skill-desc {
    color: #ffffff;
    font-size: 13px;
  }


  .skill-lv-box {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 6px 0 8px;
}

.skill-lv-row {
  background: rgba(63, 200, 249, 0.15);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
}

  @media (max-width: 1024px) {
    .main-wrapper {
      grid-template-columns: 1fr;
    }
    .sidebar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      position: static;
    }
    .sidebar h2 {
      grid-column: 1 / -1;
    }
  }
</style>
</head>

 function renderJob(jobId) {
    const job = jobData[jobId];
    if (!job) return;
 
    const viewport = document.getElementById('view-port');
 
    // อัปเดต active state ของปุ่ม
    document.querySelectorAll('.job-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-job="${jobId}"]`).classList.add('active');
 
let skillsHTML = '';

if (job.skills && job.skills.length > 0) {
  skillsHTML = job.skills.map(s => {

    let lvHTML = '';

    if (s.lv) {
      const lvArray = s.lv.split(',');

      lvHTML = lvArray.map((val, index) => `
        <div class="skill-lv-row">
          Lv ${index + 1} : ${val}
        </div>
      `).join('');
    }

    return `
      <div class="skill-item">
        <div class="skill-name"> ${s.image ? `<img src="${s.image}" alt="${s.name}" onerror="this.style.display='none'">` : '🅿️'} ${s.name}</div>
        <div class="skill-lv-box"> ${lvHTML}</div>
        <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 4px;"><strong>สถานะ:</strong> ${s.type}</div>
        <div class="skill-desc">${s.desc}</div>

      </div>
    `;
  }).join('');
}
 
    viewport.innerHTML = `
      <div class="card">
        <h1 class="job-title">${job.name}</h1>
        <p class="job-desc">${job.desc}</p>
 
        <div class="section-title">หนทางสู่อาชีพนี้...</div>
        <div class="info-box">${job.obtain}</div>        
 
        ${skillsHTML ? `<div class="section-title">⚔️ สกิล</div><div>${skillsHTML}</div>` : '<div class="section-title">⚔️ สกิล</div><div class="info-box">ยังไม่มีข้อมูล</div>'}
      </div>

      <div class="section-title">✓ คำแนะนำสำหรับอาชีพ </div>
        <div class="info-box">
          ${job.prereq.map(r => '<div class="req-item">• ' + r + '</div>').join("")}
        </div>
        
    `;
  }
 
  // เพิ่ม Event Listeners เมื่อ DOM โหลดเสร็จ
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.job-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const jobId = this.getAttribute('data-job');
        renderJob(jobId);
      });
    });
 
    // แสดงตามค่าเริ่มต้น
    renderJob('Summoner');
  });
</script>
