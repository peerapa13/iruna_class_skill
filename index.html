<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อิลูน่าข้อมูลสกิล</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+Thai:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --accent: #3fc8f9;
    --deep: #0a0812;
    --text: #e8e0f0;
    --text-dim: #9d8fb8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
  }

  #stars {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.12) 0%, transparent 60%);
  }

  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 36px;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .hero-desc {
    color: var(--text-dim);
    margin-bottom: 30px;
  }

  .main-wrapper {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 30px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }

  .sidebar h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(212, 168, 67, 0.3);
    padding-bottom: 12px;
  }

    /* การจัดกลุ่มใน Sidebar */
  .job-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  
  .group-label {
    color: var(--gold);
    font-weight: 700;
    font-size: 14px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(212, 168, 67, 0.2);
    margin-bottom: 5px;
  }
  
  .sub-group {
    margin-left: 10px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-left: 1px solid rgba(63, 200, 249, 0.3);
    padding-left: 10px;
  }
  
  .sub-label {
    color: var(--accent);
    font-size: 11px;
    margin-top: 8px;
    padding-left: 5px;
    border-left: 2px solid var(--accent);
  }
  
  .sidebar .job-btn {
    padding: 8px 12px; 
    font-size: 12px;
  }
    .group-header {
    background: rgba(212, 168, 67, 0.1);
    color: var(--gold);
    padding: 10px 15px;
    cursor: pointer;
    font-weight: bold;
    border: 1px solid rgba(212, 168, 67, 0.3);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
  }
  
  .group-header:hover {
    background: rgba(212, 168, 67, 0.2);
  }
  
  .group-content {
    display: none; /* ซ่อนไว้เริ่มต้น */
    padding-left: 10px;
    margin-top: 5px;
    flex-direction: column;
    gap: 5px;
  }
  
  /* เมื่อกลุ่มถูกเปิด */
  .job-group.active .group-content {
    display: flex;
  }
  
  .job-group.active .arrow {
    transform: rotate(180deg);
  }
  
  .arrow {
    font-size: 10px;
    transition: 0.3s;
  }
  
  .job-btn {
    text-align: left;
    padding: 12px 14px;
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    font-size: 13px;
  }

  .job-btn:hover, .job-btn.active {
    background: rgba(63, 200, 249, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .card {
    background: rgba(30, 41, 59, 0.8);
    padding: 32px;
    border-radius: 8px;
    border: 1px solid rgba(51, 65, 85, 0.8);
  }

  .job-title {
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .job-desc {
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .section-title {
    color: var(--gold);
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 10px;
  }

  .info-box {
    background: rgba(15, 23, 42, 0.8);
    padding: 14px;
    border-radius: 6px;
    border-left: 3px solid rgba(63, 200, 249, 0.5);
    color: var(--text-dim);
    line-height: 1.6;
  }

  .req-item {
    padding: 6px 0;
  }


  .skill-item {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 8px;
    padding: 16px;
    margin: 12px 0;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  .skill-name {
    color: #77D77B;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .skill-desc {
    color: #ffffff;
    font-size: 13px;
  }


/* Modal Styles */
  .modal {
    background: rgba(10, 8, 18, 0.95);
    border: 2px solid var(--gold);
    border-radius: 12px;
    color: var(--text);
    padding: 20px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 20px rgba(212, 168, 67, 0.3);
  }
  .modal::backdrop {
    background: rgba(0, 0, 0, 0.8);
  }
  .modal-header {
    color: var(--gold);
    font-family: 'Cinzel', serif;
    border-bottom: 1px solid rgba(212, 168, 67, 0.3);
    margin-bottom: 15px;
    padding-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }
  .close-modal {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 20px;
  }
  /* ปรับปุ่มเลเวลให้ดูเหมือนกดได้ */
  .skill-lv-row {
    padding: 8px;
    margin: 4px 0;
    background: rgba(212, 168, 67, 0.05);
    border: 1px dashed rgba(212, 168, 67, 0.3);
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
}

.skill-lv-row:hover {
    background: rgba(212, 168, 67, 0.2);
    border-style: solid;
    color: var(--gold-light);
}

  

  @media (max-width: 1024px) {
    .main-wrapper {
      grid-template-columns: 1fr;
    }
    .sidebar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      position: static;
    }
    .sidebar h2 {
      grid-column: 1 / -1;
    }
  }
</style>
</head>

  const modal = document.getElementById('spinnerModal');
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const spinResult = document.getElementById('spinResult');

// ดึงชื่ออาชีพจาก jobData มาทำเป็นรายการในวงล้อ
const jobs = Object.keys(jobData).map(key => jobData[key].name);
let currentRotation = 0;
let isSpinning = false;

// ฟังก์ชันเปิด-ปิด Modal
function showSpinner() { 
    modal.showModal(); 
    drawWheel(); 
}
function closeSpinner() { 
    modal.close(); 
    spinResult.innerText = "";
}

// วาดวงล้อ
function drawWheel() {
    const size = jobs.length;
    const arc = (Math.PI * 2) / size;
    ctx.clearRect(0, 0, 300, 300);
    jobs.forEach((job, i) => {
        const angle = currentRotation + (i * arc);
        ctx.beginPath();
        ctx.fillStyle = i % 2 === 0 ? "#1e293b" : "#0f172a"; 
        ctx.strokeStyle = "rgba(212, 168, 67, 0.5)";
        ctx.moveTo(150, 150);
        ctx.arc(150, 150, 140, angle, angle + arc);
        ctx.fill();
        ctx.stroke();
        ctx.save();
        ctx.translate(150, 150);
        ctx.rotate(angle + arc / 2);
        ctx.fillStyle = "#e8e0f0";
        ctx.font = "12px 'Noto Sans Thai'";
        ctx.fillText(job.substring(0, 8), 60, 5); 
        ctx.restore();
    });
}

// ฟังก์ชันหมุนวงล้อ
function spinWheel() {
    if (isSpinning) return;
    isSpinning = true;
    spinResult.innerText = "กำลังสุ่ม...";
    const spinAngle = Math.random() * 2000 + 2000; 
    const duration = 3000; /
    const start = performance.now();
    function animate(time) {
        let elapsed = time - start;
        let progress = Math.min(elapsed / duration, 1);
        let easeOut = 1 - Math.pow(1 - progress, 3);
        currentRotation = (easeOut * spinAngle) * (Math.PI / 180);
        drawWheel();
        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            isSpinning = false;
            const arc = (Math.PI * 2) / jobs.length;
            const finalAngle = (currentRotation % (Math.PI * 2));
            const index = Math.floor(jobs.length - (finalAngle / arc) % jobs.length) % jobs.length;
            const winner = jobs[index];
            spinResult.innerText = `ยินดีด้วย! คุณได้อาชีพ: ${winner}`;
        }
    }
    requestAnimationFrame(animate);
}

// ฟังก์ชันสำหรับเปิด-ปิดกลุ่มเมนู (Accordion)
function toggleGroup(element) {
  const group = element.parentElement;
  const allGroups = document.querySelectorAll('.job-group');
  
  allGroups.forEach(g => {
    if (g !== group) {
      g.classList.remove('active');
    }
  });

  group.classList.toggle('active');
}

function renderJob(jobId) {
  const job = jobData[jobId];
  if (!job) return;

  const viewport = document.getElementById('view-port');
  document.querySelectorAll('.job-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`[data-job="${jobId}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  let skillsHTML = '';

  if (job.skills && job.skills.length > 0) {
    skillsHTML = job.skills.map(s => {
      let lvHTML = '';

      if (s.lv) {
        const lvArray = s.lv.split(',');
        const locArray = s.loc ? s.loc.split(',') : [];

        lvHTML = lvArray.map((val, index) => {
          const locationInfo = locArray[index] ? locArray[index].trim() : "รอการอัปเดตสถานที่";
          return `
            <div class="skill-lv-row" 
                 onclick="openSkillModal('${s.name}', '${index + 1}', '${locationInfo}')">
              Lv ${index + 1} : เลเวลตัวละคร ${val.trim()}
            </div>
          `;
        }).join('');
      }

      return `
        <div class="skill-item">
          <div class="skill-name">
            ${s.image ? `<img src="${s.image}" style="width:24px;vertical-align:middle;margin-right:8px;">` : '🅿️'} 
            ${s.name}
          </div>
          <div class="skill-lv-box">${lvHTML}</div>
          <div style="font-size: 12px; color: var(--text-dim); margin: 8px 0 4px;"><strong>ประเภท:</strong> ${s.type}</div>
          <div class="skill-desc">${s.desc}</div>
        </div>
      `;
    }).join('');
  }

  viewport.innerHTML = `
    <div class="card">
      <h1 class="job-title">${job.name}</h1>
      <p class="job-desc">${job.desc}</p>
      <div class="section-title">หนทางสู่อาชีพนี้...</div>
      <div class="info-box">${job.obtain}</div>     
      ${skillsHTML ? `<div class="section-title">⚔️ รายละเอียดสกิล</div><div>${skillsHTML}</div>` : 
      '<div class="section-title">⚔️ สกิล</div><div class="info-box">ยังไม่มีข้อมูลสกิลในฐานข้อมูล</div>'}
      <div class="section-title">✓ คำแนะนำสำหรับอาชีพ</div>
      <div class="info-box">
        ${job.prereq.map(r => `<div class="req-item">• ${r}</div>`).join("")}
      </div>
    </div>
  `;
}
  
  function openSkillModal(skillName, lv, info) {
  const modal = document.getElementById('skillModal');
  const title = document.getElementById('modalTitle');
  const content = document.getElementById('modalContent');

  title.innerText = `${skillName} [Level ${lv}]`;
  content.innerHTML = `
      <div style="margin-bottom:10px; color: var(--text-dim);">วิธีได้รับ:</div>
      <div class="info-box" style="border-left: 3px solid var(--gold); color: #fff;">
          📍 ${info}
      </div>
  `;
  modal.showModal();
}
 
  // เพิ่ม Event Listeners เมื่อ DOM โหลดเสร็จ
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.job-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const jobId = this.getAttribute('data-job');
        renderJob(jobId);
      });
    });
 
    // แสดงตามค่าเริ่มต้น
    renderJob('Summoner');
  });
</script>
