<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iruna Online — อาชีพ</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+Thai:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --gold-dim: #8a6d28;
    --deep: #0a0812;
    --deep2: #110d1e;
    --purple: #1a0f2e;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --crimson: #dc2626;
    --teal: #0891b2;
    --emerald: #059669;
    --text: #e8e0f0;
    --text-dim: #9d8fb8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ──────── STARFIELD ──────── */
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 10%, rgba(212,168,67,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 90%, rgba(8,145,178,0.08) 0%, transparent 50%);
  }
  #stars::before, #stars::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 75%, rgba(212,168,67,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 85%, rgba(212,168,67,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 5%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(168,85,247,0.6) 0%, transparent 100%);
    background-size: 300px 300px;
  }
  #stars::after { background-size: 500px 500px; opacity: 0.5; }

  /* ──────── LAYOUT ──────── */
  .container {
    position: relative; z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ──────── HEADER ──────── */
  .hero {
    text-align: center;
    padding: 60px 20px 50px;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(212,168,67,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .crest {
    display: inline-block;
    font-size: 56px;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px rgba(212,168,67,0.5));
    animation: floatCrest 4s ease-in-out infinite;
  }
  @keyframes floatCrest {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .hero-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 900;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #b8860b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin-bottom: 12px;
    filter: drop-shadow(0 2px 8px rgba(212,168,67,0.3));
  }
  .hero-desc {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.8;
    max-width: 500px;
    margin: 0 auto 32px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
    opacity: 0.4;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider span { color: var(--gold); font-size: 14px; }


  

  /* Mobile */
  @media (max-width: 560px) {
    .card { padding: 24px 18px; }
    .result-stats { grid-template-columns: repeat(3,1fr); }
    .q-text { font-size: 15px; }
  }

</style>
</head>

  
<body>
<div id="stars"></div>
<div class="container">

<!-- ──── START SCREEN ──── -->
<div id="screen-start">
  <div class="hero">
    <div class="crest">🐺</div>
    <div class="hero-subtitle">Iruna Online</div>
    <h1 class="hero-title">ยินดีตอนรับเหล่านักผจญภัย<br>สู่ห้องสมุดแห่งอาชีพ</h1>
    <p class="hero-desc">
      แหล่งรวบรวมข้อมูลภาษาไทย<br>เกี่ยวกับทุกอาชีพในเกม
    </p>
    <div class="divider"><span>✦</span></div>
  </div>
</div>

<nav class="sidebar">
  <h2 class="hero-title"> เส้นทางอาชีพสู่อาชีพ... </h2>
  <button class="job-btn" onclick="renderJob('paladin')">พาลาดิน</button>
  <button class="job-btn" onclick="renderJob('Gladiator')">จอมดาบ</button>
  <button class="job-btn" onclick="renderJob('Beast Knight')">บีทไนท์</button>
  <button class="job-btn" onclick="renderJob('Assassin')">นักฆ่า</button>
  <button class="job-btn" onclick="renderJob('Sniper')">นักแม่น</button>
  <button class="job-btn" onclick="renderJob('Summoner')">ซัมมอนเนอร์</button>
  <button class="job-btn" onclick="renderJob('Bishop')">สังฆราช</button>
  <button class="job-btn" onclick="renderJob('Monk')">นักพรต</button>
  <button class="job-btn" onclick="renderJob('Servant')">เซอร์แวน</button>
  <button class="job-btn" onclick="renderJob('Enchanter')">ผู้วิเศษ</button>
  <button class="job-btn" onclick="renderJob('High Wizard')">จอมขมังเวทย์</button>
  <button class="job-btn" onclick="renderJob('Necromancer')">หมอผี</button>
  <button class="job-btn" onclick="renderJob('Ninja')">นินจา</button>
  <button class="job-btn" onclick="renderJob('Samurai')">ซามุไร</button>
  <button class="job-btn" onclick="renderJob('Minstrel')">นักดนตรี</button>
  <button class="job-btn" onclick="renderJob('Alchemist')">นักเล่นแร่แปรธาตุ</button>
      
</nav>
<div id="view-port"></div>




<script>
        // ฐานข้อมูลอาชีพ (ตัวอย่างข้อมูลเบื้องต้น)
        const jobData = {
            'app_warrior': {
                name: "นักรบฝึกหัด",
                skills: "• Double Attack: โจมตี 2 ครั้งซ้อน<br>• Hard Hit: โจมตีรุนแรงพร้อมโอกาสติด Stun",
                stats: "เน้น STR (พลังโจมตี) และ VIT (เลือด)",
                obtain: "รับภารกิจเปลี่ยนอาชีพได้ที่หมู่บ้านเริ่มต้น"
            },
            'paladin': {
                name: "พาลาดิน",
                skills: "• Guardian: ดึงความสนใจมอนสเตอร์มาที่ตัวเอง<br>• Holy Shield: ลดความเสียหายที่ได้รับลงอย่างมาก",
                stats: "เน้น VIT (มากที่สุด) และ INT (เพื่อใช้สกิลรักษา)",
                obtain: "เปลี่ยนจากพาลาดินฝึกหัดเมื่อเลเวล 140"
            },
            'ninja': {
                name: "นินจา",
                skills: "• Clone: สร้างร่างแยกหลบการโจมตี<br>• Dance of Death: โจมตีต่อเนื่องด้วยความเร็วสูง",
                stats: "เน้น AGI (หลบหลีก) และ CRT (คริติคอล)",
                obtain: "ต้องมีเลเวล 100 ขึ้นไป และทำเควสที่หมู่บ้านลับ"
            }

        };

      

        function renderJob(id) {
            const job = jobData[id];
            const viewport = document.getElementById('view-port');

            if (!job) {
                viewport.innerHTML = `
                    <div class="card">
                        <h1 class="job-title">กำลังรวบรวมข้อมูล...</h1>
                        <p>อาชีพนี้อยู่ในรายการอัปเดตข้อมูลเร็วๆ นี้</p>
                    </div>`;
                return;
            }

            viewport.innerHTML = `
                <div class="card">
                    <h1 class="job-title">${job.name}</h1>
                    <div class="section-title">⚔️ ข้อมูลสกิล</div>
                    <div class="info-box">${job.skills}</div>
                    
                    <div class="section-title">📊 สเตตัสที่แนะนำ</div>
                    <div class="info-box">${job.stats}</div>
                    
                    <div class="section-title">📜 วิธีที่จะได้รับสกิลมา</div>
                    <div class="info-box">${job.obtain}</div>
                </div>
            `;
        }

</script>
</body>
</html>
