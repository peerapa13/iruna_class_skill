<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iruna Online — อาชีพ</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+Thai:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --accent: #3fc8f9;
    --deep: #0a0812;
    --text: #e8e0f0;
    --text-dim: #9d8fb8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
  }

  #stars {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.12) 0%, transparent 60%);
  }

  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 36px;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .hero-desc {
    color: var(--text-dim);
    margin-bottom: 30px;
  }

  .main-wrapper {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 30px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }

  .sidebar h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(212, 168, 67, 0.3);
    padding-bottom: 12px;
  }

  .job-btn {
    text-align: left;
    padding: 12px 14px;
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    font-size: 13px;
  }

  .job-btn:hover, .job-btn.active {
    background: rgba(63, 200, 249, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .card {
    background: rgba(30, 41, 59, 0.8);
    padding: 32px;
    border-radius: 8px;
    border: 1px solid rgba(51, 65, 85, 0.8);
  }

  .job-title {
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .job-desc {
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .section-title {
    color: var(--gold);
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 10px;
  }

  .info-box {
    background: rgba(15, 23, 42, 0.8);
    padding: 14px;
    border-radius: 6px;
    border-left: 3px solid rgba(63, 200, 249, 0.5);
    color: var(--text-dim);
    line-height: 1.6;
  }

  .req-item {
    padding: 6px 0;
  }

   .skill-item {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 8px;
    padding: 16px;
    margin: 12px 0;
  }

  .skill-name {
    color: #77D77B;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .skill-desc {
    color: #ffffff;
    font-size: 13px;
  }

  @media (max-width: 1024px) {
    .main-wrapper {
      grid-template-columns: 1fr;
    }
    .sidebar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      position: static;
    }
    .sidebar h2 {
      grid-column: 1 / -1;
    }
  }
</style>
</head>

<body>
<div id="stars"></div>

<div class="hero">
  <h1 class="hero-title">🐺 Iruna Online</h1>
  <p class="hero-desc">ห้องสมุดแห่งอาชีพ | บทความข้อมูลภาษาไทย</p>
</div>

<div class="main-wrapper">
  <nav class="sidebar">
    <h2>เส้นทางอาชีพ</h2>
    <button class="job-btn" onclick="renderJob('paladin', this)">พาลาดิน</button>
    <button class="job-btn" onclick="renderJob('gladiator', this)">จอมดาบ</button>
    <button class="job-btn" onclick="renderJob('ninja', this)">นินจา</button>
    <button class="job-btn" onclick="renderJob('summoner', this)">ซัมมอนเนอร์</button>
    <button class="job-btn" onclick="renderJob('bishop', this)">สังฆราช</button>
    <button class="job-btn" onclick="renderJob('wizard', this)">จอมขมังเวทย์</button>
    <button class="job-btn" onclick="renderJob('assassin', this)">นักฆ่า</button>
    <button class="job-btn" onclick="renderJob('sniper', this)">นักแม่น</button>
  </nav>

  <div id="view-port"></div>
</div>

        { name: "โพรเทคชัน", type: "สกิลบัพ(ใช้ได้กับแค่ตัวเอง)", desc: "เพิ่มค่าDEF = [(เลเวลสกิล x 2) x (VIT/10)] + (เลเวลสกิล x 10 ) +10 <br>-ใช้MP 10 + (20 x เลเวลสกิล) " , image: "https://irunawiki.com/_next/image?url=https%3A%2F%2Fv1.irunawiki.com%2Fimages%2Fgame_icon%2F9002.dat&w=64&q=75"},

        { name: "เซอร์ไววัล", type: "สกิลติดตัว", desc: "เพิ่มการฟื้นฟูHPและMPอัตโนมัติ = [(เลเวลสกิล x 5) + 5]" },
        { name: "เอเนซิส", type: "สกิลบัพ(เป้าหมายทั้งปาร์ตี้)", desc: "ภูมิคุ้มกันอัมพาต + 1 <br>-ถ้าอัมพาตจะเป็นการรักษาอัมพาต<br>-ใช้MP 64  " ,image: "https://irunawiki.com/_next/image?url=https%3A%2F%2Fv1.irunawiki.com%2Fimages%2Fgame_icon%2F9014.dat&w=64&q=75"},
        { name: "เบบี้วูฟ", type: "สกิลติดตัว", desc: "อัญเชิญเบบี้วูฟ ใช้MP 1%  ของMPสูงสุดต่อ 1 ตัวอัญเชิญ(ถ้ามี2ตัวใช้2%ถ้ามี3ตัวใช้3%) ทุกๆ 5 วิเพื่อรักษาสภาพการอัญเชิญ หากMP ไม่พอจะยกเลิกการอัญเชิญในส่วนที่ไม่พอทันที (ยกตัวอย่าง มีmp100 อัญเชิญ 3 ตัว ใช้ ถ้ามานาเหลือ 4 อีก 5 วิถัดไปจะมานาจะเหลือ 1 ซึ่งยังเพียงพอสำหรับซัมมอน 1 ตัวก็จะคงสภาพไว้ได้1ตัว จนกว่าMpในการคงสภาพจะไม่พอ" },

    },
    'paladin': {

        { name: "Holy Shield", type: "Active", desc: "ลดความเสียหายลงอย่างมาก" }
      ]
    },
    'ninja': {
      name: "นินจา",
      desc: "นักฆ่าในเงาที่ทำการโจมตีด้วยความเร็วสูง สามารถหลบเลี่ยงได้อย่างนุ่มนวล",
      obtain: "ทำเควสเมื่อ Lv100+",
      prereq: ["เป็นนินจาฝึกหัด", "Lv140"],

        { name: "Clone", type: "Active", desc: "สร้างร่างแยกตนเอง" },
        { name: "Dance of Death", type: "Active", desc: "โจมตีต่อเนื่องความเร็วสูง" }
      ]
    },
    'gladiator': {
      name: "จอมดาบ",
      desc: "ผู้ควบคุมดาบได้อย่างชำนาญ สร้างความเสียหายสูงมากและเดินทางรวดเร็ว",

  function renderJob(id, btn) {
    const job = jobData[id];
    const viewport = document.getElementById('view-port');

    document.querySelectorAll('.job-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    let skillsHTML = '';
    if (job.skills.length > 0) {
      skillsHTML = job.skills.map(s => `
        <div class="skill-item">
          <div class="skill-name">${s.image ? `<img src="${s.image}" alt="${s.name}" onerror="this.outerHTML='${s.icon || '🅿️'}'">` : (s.icon || '🅿️')} ${s.name}</div>
          <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 4px;"><strong>สถานะ:</strong> ${s.type}</div>
          <div class="skill-desc">${s.desc}</div>
        </div>
      `).join('');
    }

    viewport.innerHTML = `
      <div class="card">
        <h1 class="job-title">${job.name}</h1>
        <p class="job-desc">${job.desc}</p>

        <div class="section-title">หนทางสู่อาชีพนี้...</div>
        <div class="info-box">${job.obtain}</div>

        <div class="section-title">✓ ข้อกำหนดเบื้องต้น</div>
        <div class="info-box">
          ${job.prereq.map(r => '<div class="req-item">• ' + r + '</div>').join("")}
        </div>

        ${skillsHTML ? `<div class="section-title">⚔️ สกิล</div><div>${skillsHTML}</div>` : ''}
      </div>
    `;
  }

  window.addEventListener('load', () => {
    document.querySelector('.job-btn').click();
  });
</script>
</body>
</html>
