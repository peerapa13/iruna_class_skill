<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Job Tree Mobile Friendly</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --special-color: #fbbf24;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            flex-direction: row; /* Desktop: แนวนอน */
        }

        /* --- Sidebar & Navigation --- */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-color);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 15px;
            border-radius: 50%;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 1001;
            cursor: pointer;
        }

        h2.category {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-top: 20px;
            border-bottom: 2px solid #334155;
            padding-bottom: 5px;
        }

        .tree-level { margin-left: 10px; border-left: 1px solid #475569; padding-left: 10px; }

        button.job-btn {
            width: 100%;
            text-align: left;
            padding: 10px;
            margin: 2px 0;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.95rem;
        }

        button.job-btn:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent-color); }

        .weapon-tab-btn {
            margin-top: 20px;
            background: var(--accent-color) !important;
            color: var(--bg-color) !important;
            font-weight: bold;
            text-align: center !important;
            border-radius: 8px;
        }

        /* --- Content Area --- */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            height: fit-content;
            margin-bottom: 80px; /* กันโดนปุ่มเมนูบัง */
        }

        .job-title { color: var(--accent-color); font-size: 2rem; margin-top: 0; }
        .section-title { color: var(--special-color); font-weight: bold; margin-top: 20px; }
        .info-box { background: rgba(15, 23, 42, 0.4); padding: 12px; border-radius: 8px; margin-top: 8px; line-height: 1.5; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }

        /* --- RESPONSIVE SETTINGS --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%); /* ซ่อนเมนูด้านซ้าย */
                width: 260px;
            }

            .sidebar.active {
                transform: translateX(0); /* แสดงเมนู */
            }

            .menu-toggle {
                display: block; /* แสดงปุ่มเปิดเมนูบนมือถือ */
            }

            .main-content {
                padding: 15px;
            }

            .job-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleMenu()">☰ อาชีพ</button>

    <nav class="sidebar" id="sidebar">
        <h2 style="color: white; margin-top: 0;">RPG Wiki</h2>
        
        <h2 class="category">🚩 สายนักรบ</h2>
        <div class="tree-level">
            <button class="job-btn" onclick="selectJob('app_warrior')">นักรบฝึกหัด</button>
            <div class="tree-level">
                <button class="job-btn" onclick="selectJob('warrior')">นักรบ</button>
                <div class="tree-level">
                    <button class="job-btn" onclick="selectJob('knight')">อัศวิน</button>
                    <div class="tree-level">
                        <button class="job-btn" onclick="selectJob('paladin')">พาลาดิน</button>
                        <button class="job-btn" onclick="selectJob('swordmaster')">จอมดาบ</button>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="category">✨ สายเวทย์</h2>
        <div class="tree-level">
            <button class="job-btn" onclick="selectJob('app_mage')">ผู้ใช้เวทย์ฝึกหัด</button>
            </div>

        <h2 class="category">🌟 สายพิเศษ (100+)</h2>
        <button class="job-btn" onclick="selectJob('ninja')">นินจา</button>
        <button class="job-btn" onclick="selectJob('samurai')">ซามุไร</button>

        <button class="job-btn weapon-tab-btn" onclick="selectWeaponStats()">📊 ข้อมูลอาวุธ</button>
    </nav>

    <main class="main-content">
        <div id="display" class="card">
            <h1 class="job-title">เลือกอาชีพ</h1>
            <p>แตะปุ่ม "☰ อาชีพ" เพื่อเลือกดูข้อมูล</p>
        </div>
    </main>

    <script>
        const jobs = {
            'app_warrior': {
                name: "นักรบฝึกหัด",
                skill: "• Bash: โจมตีหนัก<br>• Battle Cry: เพิ่มพลังโจมตีชั่วคราว",
                stat: "STR 30+, VIT 20+",
                how: "เปลี่ยนอาชีพได้ที่ NPC ฝึกสอนกลางเมือง"
            },
            'paladin': {
                name: "พาลาดิน",
                skill: "• Guardian: รับความเสียหายแทนเพื่อน<br>• Heal: ฟื้นฟูเลือด",
                stat: "เน้น VIT เป็นหลัก และ INT รอง",
                how: "เลเวล 140 จากอัศวินฝึกหัด และทดสอบความดี"
            },
            'ninja': {
                name: "นินจา",
                skill: "• Utsusemi: สร้างร่างแยกหลบการโจมตี<br>• Fire Scroll: พ่นไฟใส่ศัตรู",
                stat: "AGI และ CRT",
                how: "เลเวล 100+ ไปที่หมู่บ้านนินจาทางตอนใต้"
            }
            // เพิ่มข้อมูลอาชีพอื่นๆ ได้ที่นี่
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function selectJob(id) {
            const data = jobs[id];
            const area = document.getElementById('display');
            
            if (data) {
                area.innerHTML = `
                    <h1 class="job-title">${data.name}</h1>
                    <div class="section-title">⚔️ ข้อมูลสกิล</div>
                    <div class="info-box">${data.skill}</div>
                    <div class="section-title">📊 สเตตัสที่แนะนำ</div>
                    <div class="info-box">${data.stat}</div>
                    <div class="section-title">📜 วิธีได้รับ</div>
                    <div class="info-box">${data.how}</div>
                `;
            } else {
                area.innerHTML = `<h1 class="job-title">กำลังอัปเดตข้อมูล...</h1>`;
            }

            // ถ้าอยู่ในมือถือ ให้ปิดเมนูหลังจากเลือกเสร็จ
            if (window.innerWidth <= 768) {
                toggleMenu();
            }
        }

        function selectWeaponStats() {
            const area = document.getElementById('display');
            area.innerHTML = `
                <h1 class="job-title">📊 สเตตัส & อาวุธ</h1>
                <table>
                    <tr><th>อาวุธ</th><th>สเตตัสหลัก</th></tr>
                    <tr><td>ดาบ/ขวาน</td><td>STR (โจมตี)</td></tr>
                    <tr><td>ธนู</td><td>DEX (แม่นยำ)</td></tr>
                    <tr><td>คทา</td><td>INT (เวทย์)</td></tr>
                    <tr><td>กงเล็บ</td><td>AGI (หลบ/ไว)</td></tr>
                </table>
            `;
            if (window.innerWidth <= 768) toggleMenu();
        }
    </script>
</body>
</html>
