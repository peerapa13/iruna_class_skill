<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --accent: #3fc8f9;
    --deep: #0a0812;
    --text: #e8e0f0;
    --text-dim: #9d8fb8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
  }

  #stars {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.12) 0%, transparent 60%);
  }

  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 36px;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);

    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;

  .hero-desc {
    color: var(--text-dim);
    margin-bottom: 30px;
  }

  .main-wrapper {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 30px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }

  .sidebar h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(212, 168, 67, 0.3);
    padding-bottom: 12px;
  }

    /* การจัดกลุ่มใน Sidebar */
  .job-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  
  .group-label {
    color: var(--gold);
    font-weight: 700;
    font-size: 14px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(212, 168, 67, 0.2);
    margin-bottom: 5px;
  }
  
  .sub-group {
    margin-left: 10px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-left: 1px solid rgba(63, 200, 249, 0.3);
    padding-left: 10px;
  }
  
  .sub-label {
    color: var(--accent);
    font-size: 11px;
    margin-top: 8px;
    padding-left: 5px;
    border-left: 2px solid var(--accent);
  }
  
  .sidebar .job-btn {
    padding: 8px 12px; 
    font-size: 12px;
  }
    .group-header {
    background: rgba(212, 168, 67, 0.1);
    color: var(--gold);
    padding: 10px 15px;
    cursor: pointer;
    font-weight: bold;
    border: 1px solid rgba(212, 168, 67, 0.3);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
  }
  
  .group-header:hover {
    background: rgba(212, 168, 67, 0.2);
  }
  
  .group-content {
    display: none; /* ซ่อนไว้เริ่มต้น */
    padding-left: 10px;
    margin-top: 5px;
    flex-direction: column;
    gap: 5px;
  }
  
  /* เมื่อกลุ่มถูกเปิด */
  .job-group.active .group-content {
    display: flex;
  }
  
  .job-group.active .arrow {
    transform: rotate(180deg);
  }
  
  .arrow {
    font-size: 10px;
    transition: 0.3s;
  }
  
  .job-btn {
    text-align: left;
    padding: 12px 14px;
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    font-size: 13px;
  }

  .job-btn:hover, .job-btn.active {
    background: rgba(63, 200, 249, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .card {
    background: rgba(30, 41, 59, 0.8);
    padding: 32px;
    border-radius: 8px;
    border: 1px solid rgba(51, 65, 85, 0.8);
  }

  .job-title {
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .job-desc {
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .section-title {
    color: var(--gold);
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 10px;
  }

  .info-box {
    background: rgba(15, 23, 42, 0.8);
    padding: 14px;
    border-radius: 6px;
    border-left: 3px solid rgba(63, 200, 249, 0.5);
    color: var(--text-dim);
    line-height: 1.6;
  }

  .req-item {
    padding: 6px 0;
  }


  /* ปุ่มสกิลแบบกริด */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .skill-btn {
    padding: 14px;
    background: rgba(30, 41, 59, 0.6);
    border: 2px solid rgba(212, 168, 67, 0.4);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 13px;
    font-weight: 600;
  }

  .skill-btn:hover {
    background: rgba(212, 168, 67, 0.15);
    border-color: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(212, 168, 67, 0.2);
  }

  .skill-btn:active {
    transform: translateY(0);
  }

  .skill-btn img {
    width: 32px;
    display: block;
    margin: 0 auto 8px;
    border-radius: 4px;
  }



/* Modal Styles */
 .modal {

  .close-modal {

    border-radius: 6px;

  .skill-lv-tab:hover {
    background: rgba(212, 168, 67, 0.15);

  .lv-header {
    font-weight: 600;
    color: var(--gold-light);

  }

  .lv-location {
    font-size: 12px;
    color: var(--text-dim);

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }


  

  @media (max-width: 1024px) {
    .main-wrapper {
      grid-template-columns: 1fr;
    }
    .sidebar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      position: static;
    }
    .sidebar h2 {
      grid-column: 1 / -1;
    }
    .skills-grid {
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }
  }
</style>
</head>

<script>
  const JOB_DATA_PATH = './data/jobs/';
  // Map of jobs to their JSON files
  const jobFilesMap = {
    'Summoner': 'summoner.json',
    'Paladin': 'paladin.json',
    'Gladiator': 'gladiator.json',
    'Beast Knight': 'beastknight.json',
    'Sniper': 'sniper.json',
    'Assassin': 'assassin.json',
    'High Wizard': 'highwizard.json',
    'Necromancer': 'necromancer.json',
    'Enchanter': 'enchanter.json',
    'Bishop': 'bishop.json',
    'Monk': 'monk.json',
    'Servant': 'servant.json',
    'Ninja': 'ninja.json',
    'Samurai': 'samurai.json',
    'Minstrel': 'minstrel.json',
    'Alchemist': 'alchemist.json'
  };

  // Load job data from JSON file
  async function loadJobData(jobId) {
    try {
      const fileName = jobFilesMap[jobId];
      if (!fileName) {
        console.error(`ไม่พบไฟล์สำหรับ ${jobId}`);
        return null;
      }
      
      const response = await fetch(`${JOB_DATA_PATH}${fileName}`);
      if (!response.ok) {
        console.error(`ไม่สามารถโหลด ${fileName}`);
        return null;
      }
      
      const data = await response.json();
      return data;
    } catch (error) {
      console.error(`เกิดข้อผิดพลาดในการโหลดข้อมูล: ${error}`);
      return null;
    }
  }

// ฟังก์ชันสำหรับเปิด-ปิดกลุ่มเมนู (Accordion)
function toggleGroup(element) {
  const group = element.parentElement;
  const allGroups = document.querySelectorAll('.job-group');
  
  allGroups.forEach(g => {
    if (g !== group) {
      g.classList.remove('active');
    }
  });

  group.classList.toggle('active');
}

  async function renderJob(jobId) {
    const viewport = document.getElementById('view-port');
    viewport.innerHTML = '<div class="card"><div class="loading">⏳ กำลังโหลดข้อมูล...</div></div>';
    
    const job = await loadJobData(jobId);
    
    if (!job) {
      viewport.innerHTML = '<div class="card"><div class="loading">❌ ไม่สามารถโหลดข้อมูลได้</div></div>';
      return;
    }

    
  document.querySelectorAll('.job-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`[data-job="${jobId}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  let skillsHTML = '';

 if (job.skills && job.skills.length > 0) {
    skillsHTML = '<div class="skills-grid">' +
  [...job.skills]
  .sort((a, b) => {
    if (!a.image && b.image) return -1;
    if (a.image && !b.image) return 1;
    return 0;
  })
  .map(s => {
        const skillNameEsc = s.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
        const skillTypeEsc = s.type.replace(/'/g, "\\'").replace(/"/g, '\\"');
        const skillDescEsc = s.desc.replace(/'/g, "\\'").replace(/"/g, '\\"');
        const skillLvEsc = (s.lv || '').replace(/'/g, "\\'").replace(/"/g, '\\"');
        const skillLocEsc = (s.loc || '').replace(/'/g, "\\'").replace(/"/g, '\\"');
        const skillImgEsc = (s.image || '').replace(/'/g, "\\'").replace(/"/g, '\\"');

        return `
          <button class="skill-btn" onclick="openSkillDetailModal('${skillNameEsc}', '${skillTypeEsc}', '${skillDescEsc}', '${skillLvEsc}', '${skillLocEsc}', '${skillImgEsc}')">
            ${s.image ? `<img src="${s.image}">` : '🅿️'}
            <span>${s.name}</span>
          </button>
        `;
      }).join('') +
      '</div>';
  }


  viewport.innerHTML = `
    <div class="card">
      <h1 class="job-title">${job.name}</h1>
      <p class="job-desc">${job.desc}</p>
      <div class="section-title">หนทางสู่อาชีพนี้...</div>
      <div class="info-box">${job.obtain}</div>     
      ${skillsHTML ? `<div class="section-title">⚔️ ข้อมูลสกิล</div><div>${skillsHTML}</div>` : 
      '<div class="section-title">⚔️ สกิล</div><div class="info-box">ยังไม่มีข้อมูลสกิลในฐานข้อมูล</div>'}
      <div class="section-title">✓ คำแนะนำสำหรับอาชีพ</div>
      <div class="info-box">
        ${job.prereq.map(r => `<div class="req-item">• ${r}</div>`).join("")}
      </div>
    </div>
  `;
}
  
  function openSkillDetailModal(skillName, skillType, skillDesc, skillLv, skillLoc, skillImage) {
  const modal = document.getElementById('skillModal');
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');

  const lvArray = skillLv ? skillLv.split(',') : [];
  const locArray = skillLoc ? skillLoc.split(',') : [];

  let lvTabsHTML = '';
  if (lvArray.length > 0) {
    lvTabsHTML = '<div class="skill-lv-tabs">' +
      lvArray.map((lv, idx) => {
        const locInfo = locArray[idx] ? locArray[idx].trim() : 'รอการอัปเดต';
        return `
          <div class="skill-lv-tab">
            <div class="lv-header">📍 Level ${idx + 1}</div>
            <div>เลเวลตัวละคร: <strong>${lv.trim()}</strong></div>
            <div class="lv-location">${locInfo}</div>
          </div>
        `;
      }).join('') +
      '</div>';
  }

  header.innerHTML = `
    <div>
      ${skillImage ? `<img src="${skillImage}" style="width:36px;vertical-align:middle;margin-right:8px;border-radius:4px;">` : ''}
      ${skillName}
    </div>
    <button class="close-modal" onclick="document.getElementById('skillModal').close()">✕</button>
  `;

  body.innerHTML = `
    <div class="skill-detail-type">${skillType}</div>
    <div class="skill-detail-desc">${skillDesc}</div>
    ${lvTabsHTML ? `<div style="margin-bottom: 8px; font-weight: 600; color: var(--gold);">วิธีการรับสกิล</div>${lvTabsHTML}` : ''}
  `;

  modal.showModal();
}

        </h2>
        <div class="update-list">
          ${HOME_CONTENT.recent.map(item => `

                <strong style="color: var(--gold-light);">${item.title}</strong>
                <span style="font-size: 0.75rem; color: var(--text-dim);">${item.date}</span>
              </div>
              <small style="color: var(--text-dim);">${item.desc}</small>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  
  container.innerHTML = html;
}
 
  // เพิ่ม Event Listeners เมื่อ DOM โหลดเสร็จ
  document.addEventListener('DOMContentLoaded', function() {
    renderHome();
    document.querySelectorAll('.job-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const jobId = this.getAttribute('data-job');
        renderJob(jobId);
      });
    });
  });
</script>

 <dialog id="skillModal" class="modal">

  <div class="modal-body" id="modalBody"></div>
</dialog>
